name: Repair legacy web fonts

on:
  push:
    branches:
      - agent/repair-ios-fonts
    paths:
      - BUKURSV.TTF
      - karina-cyrillic.ttf
      - tools/repair_web_fonts.py
      - .github/workflows/repair-web-fonts.yml
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/repair-ios-fonts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install font tools
        run: python -m pip install --disable-pip-version-check "fonttools[woff]" brotli

      - name: Repair and validate fonts
        run: python tools/repair_web_fonts.py

      - name: Commit generated web fonts
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html bulgarian-kursiv.woff2 karina-cyrillic.woff2

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "Repair legacy fonts for Safari"
          git push origin HEAD:agent/repair-ios-fonts
