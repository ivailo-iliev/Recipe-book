name: Repair legacy web fonts

on:
  push:
    branches:
      - agent/repair-ios-fonts
    paths:
      - BUKURSV.TTF
      - karina-cyrillic.ttf
      - tools/repair_web_fonts.py
      - tools/inspect_legacy_fonts.py
      - .github/workflows/repair-web-fonts.yml
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/repair-ios-fonts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install font tools
        run: python -m pip install --disable-pip-version-check "fonttools[woff]" brotli

      - name: Inspect legacy font mappings
        run: python tools/inspect_legacy_fonts.py > font-inspection.log 2>&1

      - name: Repair and capture validation output
        shell: bash
        run: |
          set +e
          python tools/repair_web_fonts.py > repair-fonts.log 2>&1
          status=$?
          echo "$status" > repair-fonts.status
          cat repair-fonts.log
          exit 0

      - name: Upload font diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-font-diagnostics
          path: |
            BUKURSV.TTF
            karina-cyrillic.ttf
            font-inspection.log
            repair-fonts.log
            repair-fonts.status
            bulgarian-kursiv.woff2
            karina-cyrillic.woff2
          if-no-files-found: warn

      - name: Commit generated files or diagnostic logs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f font-inspection.log repair-fonts.log repair-fonts.status
          git add index.html
          test ! -f bulgarian-kursiv.woff2 || git add bulgarian-kursiv.woff2
          test ! -f karina-cyrillic.woff2 || git add karina-cyrillic.woff2

          if ! git diff --cached --quiet; then
            git commit -m "Capture legacy font mappings"
            git push origin HEAD:agent/repair-ios-fonts
          fi

          exit "$(cat repair-fonts.status)"
